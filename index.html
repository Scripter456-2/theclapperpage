<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>you are goonin to epstein?!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .background-image {
            background-image: url('https://i.guim.co.uk/img/media/1e3e5e2f6f3501befb629560ffe172a54ce3f016/139_98_2145_1287/master/2145.jpg?width=465&dpr=1&s=none&crop=none');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .overlay-text {
            color: white;
            font-size: 2rem;
            font-family: sans-serif;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
            pointer-events: none;
            /* Hidden by default, only shows if autoplay fails */
            display: none; 
        }
    </style>
</head>
<body>

    <div class="background-image" id="screen" onclick="playAudio()">
        <div id="status" class="overlay-text">Click to start</div>
    </div>

    <audio id="myAudio" src="clap.mp3" loop></audio>

    <script>
        const audio = document.getElementById("myAudio");
        const statusText = document.getElementById("status");

        function playAudio() {
            audio.play().then(() => {
                statusText.style.display = "none";
            }).catch(error => {
                // If browser blocks autoplay, show the "Click to start" text
                statusText.style.display = "block";
            });
        }

        // Try to start immediately on page load
        window.onload = playAudio;

        // Try to start on any touch or click (the most reliable way)
        document.addEventListener('click', playAudio, { once: true });
        document.addEventListener('touchstart', playAudio, { once: true });
    </script>

</body>
</html>
