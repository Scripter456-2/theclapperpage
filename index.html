<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>you are goonin to epstein?!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents scrolling */
        }

        .background-image {
            /* Replace the URL below with your image link */
            background-image: url('https://img.ihned.cz/attachment.php/580/73868580/mQo19dF7lyHW4pfKIDbJgLeOjqRcva03/EK34_34_Epstein_Reuters.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .overlay-text {
            color: white;
            font-size: 2rem;
            font-family: sans-serif;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            pointer-events: none; /* Let clicks pass through to the div */
        }
    </style>
</head>
<body>

    <!-- Full screen container -->
    <div class="background-image" onclick="playAudio()">
        <div id="status" class="overlay-text">Click anywhere to start</div>
    </div>

    <audio id="myAudio" src="clap.mp3" loop></audio>

    <script>
        function playAudio() {
            const audio = document.getElementById("myAudio");
            const statusText = document.getElementById("status");
            
            audio.play().then(() => {
                // Audio started successfully
                statusText.style.display = "none";
            }).catch(error => {
                console.log("Autoplay was prevented. Waiting for user interaction.");
            });
        }
    </script>

</body>
</html>
